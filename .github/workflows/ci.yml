name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Bağımlılıkları kur (kilitli sürümler)
        run: pip install -r requirements.lock

      - name: Testleri çalıştır
        run: python -m pytest tests/ -v
